name: Deploy API Only

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy API folder via FTP
        run: |
          if [ -d "api" ]; then
            lftp -c "
              set ftp:ssl-allow no;
              set ftp:passive-mode on;
              set net:timeout 30;
              set net:max-retries 3;
              open -u '${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
              cd domains/join.rcsfacility.com/public_html;
              lcd api;
              mirror -R --no-symlinks --parallel=4 --no-perms --overwrite;
              quit
            "
            echo "API folder deployed successfully"
          else
            echo "No api/ folder found - skipping"
          fi

      - name: Deploy API .htaccess
        run: |
          mkdir -p deploy_api_ess
          cat > deploy_api_ess/.htaccess << 'HTACCESS'
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^(.*)$ $1.php [QSA,L]

          <IfModule mod_headers.c>
              Header set Access-Control-Allow-Origin "*"
              Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
              Header set Access-Control-Allow-Headers "Content-Type, Authorization, X-API-KEY, X-Employee-ID"
          </IfModule>

          <IfModule mod_expires.c>
              ExpiresActive On
              ExpiresByType application/json "access plus 0 seconds"
          </IfModule>
          HTACCESS

          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
            cd domains/join.rcsfacility.com/public_html/api/ess;
            lcd deploy_api_ess;
            put .htaccess;
            quit
          "
          rm -rf deploy_api_ess
          echo "API .htaccess deployed successfully"

      - name: Done
        run: echo "API deployment completed"

name: Deploy API Only

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy API folder via FTP
        env:
          LFTP_PW: ${{ secrets.FTP_PASS }}
        run: |
          if [ -d "api" ]; then
            lftp -u '${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }} << 'EOF'
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set ftp:sync-mode off
          set net:timeout 60
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 2
          set net:connection-limit 2
          set mirror:parallel-transfer-count 2
          set mirror:use-pget-n 2
          cd api/ess
          lcd api/ess
          mirror -R --no-symlinks --no-perms --overwrite --only-newer --verbose=1
          quit
          EOF
            echo "API folder deployed successfully"
          else
            echo "No api/ folder found - skipping"
          fi

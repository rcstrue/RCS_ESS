name: Build & Deploy (Static via FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP (upload and overwrite, preserve other files)
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
            cd public_html;
            lcd dist;
            mirror -R --no-symlinks --parallel=4 --no-perms --overwrite;
            quit
          "
          echo "Deploy completed - files uploaded and overwritten, other server files preserved"

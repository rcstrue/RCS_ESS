name: Build & Deploy (Static + API via FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # ─── Config ───
      - name: Set FTP remote path
        run: echo "REMOTE_BASE=domains/join.rcsfacility.com/public_html" >> $GITHUB_ENV

      - name: Deploy frontend via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
            cd ${{ env.REMOTE_BASE }};
            lcd dist;
            mirror -R --no-symlinks --parallel=4 --no-perms --overwrite;
            quit
          "
          echo "Frontend deployed successfully"

      - name: Deploy API folder via FTP
        run: |
          if [ -d "api" ]; then
            lftp -c "
              set ftp:ssl-allow no;
              set ftp:passive-mode on;
              set net:timeout 30;
              set net:max-retries 3;
              open -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
              cd ${{ env.REMOTE_BASE }};
              lcd api;
              mirror -R --no-symlinks --parallel=4 --no-perms --overwrite;
              quit
            "
            echo "API folder deployed successfully"
          else
            echo "No api/ folder found in repo - skipping API deploy"
          fi

      - name: Deploy root .htaccess via FTP
        run: |
          mkdir -p deploy_tmp
          cat > deploy_tmp/.htaccess << 'HTACCESS'
          # SPA fallback + cache control
          RewriteEngine On

          # Force HTTPS
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

          # API requests pass through
          RewriteRule ^api/(.*)$ api/$1 [QSA,L]

          # SPA fallback
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^(.*)$ /index.html [QSA,L]

          # HTML no cache
          <IfModule mod_headers.c>
              <FilesMatch "\.(html)$">
                  Header set Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
                  Header set Pragma "no-cache"
              </FilesMatch>
              <FilesMatch "\.(js|css)$">
                  Header set Cache-Control "public, max-age=31536000, immutable"
              </FilesMatch>
          </IfModule>

          # Security
          <IfModule mod_headers.c>
              Header set X-Content-Type-Options "nosniff"
              Header set X-Frame-Options "SAMEORIGIN"
              Header set X-XSS-Protection "1; mode=block"
          </IfModule>
          HTACCESS

          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
            cd ${{ env.REMOTE_BASE }};
            lcd deploy_tmp;
            put .htaccess;
            quit
          "
          rm -rf deploy_tmp
          echo "Root .htaccess deployed successfully"

      - name: Deploy api/ess .htaccess via FTP
        run: |
          mkdir -p deploy_api_ess
          cat > deploy_api_ess/.htaccess << 'HTACCESS'
          # RCS ESS API - Fixed & Production Safe
          RewriteEngine On

          # CORS HEADERS
          <IfModule mod_headers.c>
              Header always set Access-Control-Allow-Origin "*"
              Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
              Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-API-KEY, X-Employee-ID"
              Header always set Access-Control-Max-Age "86400"
          </IfModule>

          # HANDLE PREFLIGHT OPTIONS - Return empty 200 immediately
          <IfModule mod_rewrite.c>
              RewriteCond %{REQUEST_METHOD} ^OPTIONS$
              RewriteRule ^ - [R=200,L]
          </IfModule>

          # ROUTE CLEAN URLS → PHP FILES
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^([a-zA-Z0-9_-]+)$ $1.php [L]

          # BLOCK DIRECT CONFIG ACCESS
          <FilesMatch "config\.php$">
              <IfModule mod_authz_core.c>
                  Require all denied
              </IfModule>
              <IfModule !mod_authz_core.c>
                  Order allow,deny
                  Deny from all
              </IfModule>
          </FilesMatch>

          # BLOCK DOTFILES
          <FilesMatch "^\.">
              <IfModule mod_authz_core.c>
                  Require all denied
              </IfModule>
              <IfModule !mod_authz_core.c>
                  Order allow,deny
                  Deny from all
              </IfModule>
          </FilesMatch>

          # NO-CACHE FOR API RESPONSES
          <IfModule mod_headers.c>
              Header always set Cache-Control "no-store, no-cache, must-revalidate"
              Header always set Pragma "no-cache"
          </IfModule>
          HTACCESS

          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};
            cd ${{ env.REMOTE_BASE }}/api/ess;
            lcd deploy_api_ess;
            put .htaccess;
            quit
          "
          rm -rf deploy_api_ess
          echo "API .htaccess deployed successfully"

      - name: Deploy complete
        run: echo "All deployment steps completed successfully"
